<!DOCTYPE html>
<html class="page" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./icons/favicon-24x24.svg" />
    <script src="./js/index.js" type="module" defer></script>
    <link href="./css/index.css" rel="stylesheet" />
    <title>Nike Air Mag</title>
  </head>
  <body class="page__body">
    <header class="header">
      <div class="container header__container">
        <a class="logo header__logo" href="/">
          <img
            class="logo__icon"
            src="./icons/nike-logo.svg"
            alt="Логотип Nike"
            width="50"
            height="20"
          />
        </a>
        <nav id="header__menu" class="menu header__menu" area-label="Главное меню">
          <ul class="menu__list">
            <li class="menu__item">
              <a class="menu__link" href="#air-mag" lang="en">Air Mag</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#sizes">Размеры</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#characteristics">Характеристики</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#top-models">Другие ТОП модели</a>
            </li>
          </ul>
        </nav>
        <div class="header__controls">
          <a class="header__order" href="#">Сделать заказ</a>
          <div class="header__actions">
            <button
              class="header__actions-button"
              aria-label="Поиск"
              title="Поиск"
            >
              <svg width="24" height="24">
                <use
                  class="header__actions-icon"
                  href="./icons/sprites.svg#search"
                ></use>
              </svg>
            </button>
            <button
              class="header__actions-button"
              aria-label="Корзина"
              title="Корзина"
            >
              <svg width="24" height="24">
                <use
                  class="header__actions-icon"
                  href="./icons/sprites.svg#cart"
                ></use>
              </svg>
            </button>
            <button
              class="header__burger burger"
              aria-label="Открыть меню"
              aria-expanded="false"
              aria-controls="header__menu"
              title="Корзина"
            >
              <svg width="24" height="24">
                <use
                  class="burger__icon burger__icon--menu"
                  href="./icons/sprites.svg#burger"
                ></use>
                <use
                  class="burger__icon burger__icon--cross"
                  href="./icons/sprites.svg#cross"
                ></use>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
